name: Build and Release .deb

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install nfpm
        run: |
          echo "Installing nfpm..."
          curl -sfL https://install.goreleaser.com/github.com/goreleaser/nfpm.sh | sh -s -- -b /usr/local/bin

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        working-directory: packaging
        run: |
          chmod +x scripts/postinst scripts/prerm scripts/postrm bin/vibing-linux build-deb.sh
          export VERSION="${{ steps.version.outputs.version }}"
          nfpm pkg --packager deb --target "vibing-linux_${VERSION}_amd64.deb"

      - name: Inspect package
        working-directory: packaging
        run: |
          dpkg -I "vibing-linux_${{ steps.version.outputs.version }}_amd64.deb"
          dpkg -c "vibing-linux_${{ steps.version.outputs.version }}_amd64.deb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/vibing-linux_${{ steps.version.outputs.version }}_amd64.deb
          generate_release_notes: true
          body: |
            ## Installation

            Download `vibing-linux_${{ steps.version.outputs.version }}_amd64.deb` and install:

            ```bash
            sudo apt install ./vibing-linux_${{ steps.version.outputs.version }}_amd64.deb
            ```

            Then run `vibing-linux` — first-time setup will run automatically.

            ## Uninstall

            ```bash
            sudo apt remove vibing-linux
            ```
