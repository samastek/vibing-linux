name: vibing-linux
arch: amd64
platform: linux
version: ${VERSION}
maintainer: Sami Alzein <sami.alzein@hotmail.com>
description: |
  Offline voice-to-text for Linux with LLM correction.
  Hold a hotkey to record, release to transcribe.
  Uses Whisper for speech recognition and a local LLM for text correction.
vendor: VibeVoice
homepage: https://github.com/VibeVoice/vibing-linux
license: MIT
section: utils
priority: optional

depends:
  - python3 (>= 3.10)
  - python3-venv
  - python3-dev
  - python3-gi
  - python3-gi-cairo
  - python3-xdg
  - gir1.2-ayatanaappindicator3-0.1 | gir1.2-appindicator3-0.1
  - libportaudio2
  - wl-clipboard | xclip | xsel

recommends:
  - nvidia-driver
  - wtype | ydotool | xdotool

contents:
  # Application source code
  - src: ../vibing/
    dst: /opt/vibing-linux/vibing/
    type: tree

  # pyproject.toml for pip install
  - src: ../pyproject.toml
    dst: /opt/vibing-linux/pyproject.toml

  # Launcher script
  - src: bin/vibing-linux
    dst: /usr/bin/vibing-linux
    file_info:
      mode: 0755

  # Desktop entry
  - src: assets/vibing-linux.desktop
    dst: /usr/share/applications/vibing-linux.desktop
    file_info:
      mode: 0644

  # Autostart entry
  - src: assets/vibing-linux-autostart.desktop
    dst: /etc/xdg/autostart/vibing-linux.desktop
    file_info:
      mode: 0644

  # Application icon
  - src: assets/vibing-linux.svg
    dst: /usr/share/icons/hicolor/scalable/apps/vibing-linux.svg
    file_info:
      mode: 0644

scripts:
  postinstall: scripts/postinst
  preremove: scripts/prerm
  postremove: scripts/postrm
